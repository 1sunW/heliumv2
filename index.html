<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function() {
        const originalParse = JSON.parse;
        JSON.parse = function(text, reviver) {
          if (text === undefined || text === null || text === "undefined" || text === "null") {
            return null;
          }
          if (typeof text === 'string') {
            const trimmed = text.trim();
            if (trimmed === 'undefined' || trimmed === 'null' || trimmed === '') {
              return null;
            }
          }
          try {
            return originalParse(text, reviver);
          } catch (e) {
            if (typeof text === 'string') {
              const trimmed = text.trim();
              if (trimmed === 'undefined' || trimmed === 'null' || trimmed === '') {
                return null;
              }
            }
            throw e;
          }
        };
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Helium</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/1sunW/ICONS-FOR-LINKS/refs/heads/main/Helium-Logo.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FCYPDVJCG4"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-FCYPDVJCG4');
    </script>
    <style>
      /* Hide the google translate banner */
      .goog-te-banner-frame.skiptranslate { display: none !important; }
      body { top: 0px !important; }
      .goog-tooltip { display: none !important; }
      .goog-tooltip:hover { display: none !important; }
      .goog-text-highlight { background-color: transparent !important; border: none !important; box-shadow: none !important; }
      #google_translate_element { display: none; }
    </style>
  </head>
  <body>
    <div id="google_translate_element"></div>
    <div id="root"></div>
    <script>
      // Clear any hostile service workers cached by older plugin
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
          }
        });
      }
    </script>
    <script>
      function loadThirdPartyIntegrations() {
        // Guard against loading in sandboxed iframes to prevent CORS and appendChild issues
        if (window.self !== window.top) {
          console.log("Framed preview environment detected. Skipping external translation and chat widgets to maintain stability.");
          return;
        }

        // Initialize Google Translate dynamically
        window.googleTranslateElementInit = function() {
          if (window.google && window.google.translate) {
            new window.google.translate.TranslateElement({pageLanguage: 'en', autoDisplay: false}, 'google_translate_element');
          }
        };

        const translateScript = document.createElement('script');
        translateScript.type = 'text/javascript';
        translateScript.async = true;
        translateScript.src = 'https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit';
        document.body.appendChild(translateScript);

        // Initialize Widgetbot Crate dynamically
        const crateScript = document.createElement('script');
        crateScript.type = 'text/javascript';
        crateScript.async = true;
        crateScript.src = 'https://cdn.jsdelivr.net/npm/@widgetbot/crate@3';
        crateScript.onload = function() {
          if (typeof Crate !== "undefined" && document.body) {
            try {
              new Crate({
                server: '1469843371177803869',
                channel: '1498469730833403945'
              });
            } catch (e) {
              console.warn("Crate initialization bypassed safely:", e);
            }
          }
        };
        document.body.appendChild(crateScript);
      }

      if (document.readyState === 'complete') {
        loadThirdPartyIntegrations();
      } else {
        window.addEventListener('load', loadThirdPartyIntegrations);
      }
    </script>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
