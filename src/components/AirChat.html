<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <title>Air, a new chatroom</title>
    <style>
        body {
            margin: 0;
            padding: 10px;
            font-family: 'Nunito', sans-serif;
            background-color: #E6E6FA; /* Lavender background */
            color: #4B0082; /* Indigo text color */
            background-image: url('https://images-wixmp-ed30a86b8c4ca887773594c2.wixmp.com/f/c13c0d2f-1bc2-47e5-b959-70aaa89f724d/dfq0rdy-9e290f6c-b396-4eba-bf38-c48fc308e0ce.png?token=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJ1cm46YXBwOjdlMGQxODg5ODIyNjQzNzNhNWYwZDQxNWVhMGQyNmUwIiwiaXNzIjoidXJuOmFwcDo3ZTBkMTg4OTgyMjY0MzczYTVmMGQ0MTVlYTBkMjZlMCIsIm9iaiI6W1t7InBhdGgiOiJcL2ZcL2MxM2MwZDJmLTFiYzItNDdlNS1iOTU5LTcwYWFhODlmNzI0ZFwvZGZxMHJkeS05ZTI5MGY2Yy1iMzk2LTRlYmEtYmYzOC1jNDhmYzMwOGUwY2UucG5nIn1dXSwiYXVkIjpbInVybjpzZXJ2aWNlOmZpbGUuZG93bmxvYWQiXX0.5629DVVGtMC0cS2BTr7Hiq8EVW7t2SmgOteQm4mYbwQ');
            background-size: cover;
            background-attachment: fixed;
        }

        .more-dropdown {
            position: relative;
            display: inline-block;
        }

        .more-content {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            background-color: rgba(230, 230, 250, 0.9);
            min-width: 160px;
            box-shadow: 0 0 15px #9370DB;
            border: 2px solid #9370DB;
            border-radius: 10px;
            z-index: 1000;
        }

        .more-content button {
            display: block;
            width: 100%;
            text-align: left;
            padding: 12px 16px;
            border: none;
            background: transparent;
            color: #4B0082;
            cursor: pointer;
        }

        .more-content button:hover {
            background-color: rgba(147, 112, 219, 0.2);
        }

        .show {
            display: block !important;
        }

        .login-container, .chat-container {
            width: 400px;
            margin: 20px auto;
            text-align: center;
            padding: 20px;
            border: 3px solid #9370DB;
            border-radius: 15px;
            background-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 20px #9370DB;
        }

        .chat-container {
            height: 500px;
            display: none;
        }

        #returnHomeButton, #clearChatButton, #downloadLogButton {
            background: #9370DB;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
            margin-right: 10px;
            font-weight: bold;
        }

        #returnHomeButton:hover, #clearChatButton:hover, #downloadLogButton:hover {
            background: #8A2BE2;
            box-shadow: 0 0 10px #9370DB;
        }

        .user-status {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 5px;
        }

        .status-online {
            background-color: #32CD32;
        }

        .status-offline {
            background-color: #DC143C;
        }

        .chat-messages {
            height: 400px;
            padding: 10px;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.7);
            scroll-behavior: smooth;
            border-radius: 10px;
        }

        .message-input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 2px solid #9370DB;
            background: rgba(255, 255, 255, 0.9);
            color: #4B0082;
            border-radius: 20px;
        }

        .message-input:focus {
            outline: none;
            border-color: #8A2BE2;
            box-shadow: 0 0 5px rgba(147, 112, 219, 0.5);
        }

        .message-input::placeholder {
            color: #9370DB;
        }

        .message {
            margin: 5px;
            padding: 10px;
            background: rgba(230, 230, 250, 0.3);
            border-radius: 20px;
            box-shadow: 0 1px 2px rgba(147, 112, 219, 0.2);
            border-left: 3px solid #9370DB;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .username {
            font-weight: bold;
            color: #8A2BE2;
        }

        .timestamp {
            font-size: 0.8em;
            color: #9370DB;
            margin-top: 4px;
        }

        button {
            padding: 10px 20px;
            background: #9370DB;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        button:hover {
            background: #8A2BE2;
            box-shadow: 0 0 10px #9370DB;
        }

        input, .room-select {
            padding: 8px;
            margin: 10px;
            border: 2px solid #9370DB;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.9);
            color: #4B0082;
        }

        .room-select {
            width: 200px;
        }

        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 2px solid #9370DB;
        }

        .room-header h3 {
            margin: 0;
            color: #8A2BE2;
            font-size: 1.5em;
            font-family: 'Bangers', cursive;
        }

        @media screen and (max-width: 600px) {
            .login-container, .chat-container {
                width: 95%;
                margin: 10px auto;
            }

            .room-header {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Login Container -->
    <div class="login-container" id="loginContainer">
        <h2>Welcome to Air</h2>
        <input type="text" id="usernameInput" placeholder="Enter username">
        <select id="roomSelect" class="room-select">
            <option value="chat1">Chat 1</option>
            <option value="chat2">Chat 2</option>
            <option value="chat3">Chat 3</option>
            <option value="chat4">Chat 4</option>
        </select>
        <button onclick="joinChat()">Join Chat</button>
    </div>

    <!-- Chat Container -->
    <div class="chat-container" id="chatContainer">
        <div class="room-header">
            <h3 id="currentRoom">Room: General Chat</h3>
            <div class="more-dropdown">
                <button id="moreButton">More ▼</button>
                <div class="more-content" id="moreDropdown">
                    <button id="downloadLogButton">Download Chat Log</button>
                    <button id="clearChatButton">Clear Chat</button>
                    <button id="returnHomeButton">Return Home</button>
                </div>
            </div>
            <select id="roomSwitcher" class="room-select">          
                <option value="chat1">Chat 1</option>
                <option value="chat2">Chat 2</option>
                <option value="chat3">Chat 3</option>
                <option value="chat4">Chat 4</option>
            </select>
        </div>
        <div class="chat-messages" id="messageArea"></div>
        <div class="input-container" style="display: flex; padding: 10px;">
            <input type="text" class="message-input" id="messageInput" placeholder="Type your message...">
            <button id="sendButton" style="margin-left: 5px;">Send</button>
        </div>
    </div>
  <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, set, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCKBl-YN9aEb7jJ2EBEsBGFK262Eq3MYQQ",
            authDomain: "wow-sigma.firebaseapp.com",
            databaseURL: "https://wow-sigma-default-rtdb.firebaseio.com",
            projectId: "wow-sigma",
            storageBucket: "wow-sigma.firebasestorage.app",
            messagingSenderId: "429627585652",
            appId: "1:429627585652:web:de43f1d71bc9d1af220d21"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let username = '';
        let currentRoom = 'chat1';
        let currentMessagesRef;
        let messageListener;

        const loginContainer = document.getElementById('loginContainer');
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const messageArea = document.getElementById('messageArea');
        const usernameInput = document.getElementById('usernameInput');
        const roomSelect = document.getElementById('roomSelect');
        const roomSwitcher = document.getElementById('roomSwitcher');
        const currentRoomHeader = document.getElementById('currentRoom');
        const downloadLogButton = document.getElementById('downloadLogButton');
        const clearChatButton = document.getElementById('clearChatButton');
        const moreButton = document.getElementById('moreButton');
        const moreDropdown = document.getElementById('moreDropdown');
        const returnHomeButton = document.getElementById('returnHomeButton');

        function sanitizeMessage(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        window.joinChat = function() {
            username = usernameInput.value.trim();
            currentRoom = roomSelect.value;

            if (username) {
                saveUsername(username);
                loginContainer.style.display = 'none';
                chatContainer.style.display = 'block';
                currentRoomHeader.textContent = `Room: ${roomSelect.options[roomSelect.selectedIndex].text}`;
                joinRoom(currentRoom);
            } else {
                alert('Please enter a username');
            }
        }

        function joinRoom(roomName) {
            messageArea.innerHTML = '';

            if (messageListener) {
                messageListener();
            }

            currentRoom = roomName;
            currentMessagesRef = ref(db, `rooms/${roomName}/messages`);

            roomSwitcher.value = roomName;
            loadMessages();

            currentRoomHeader.textContent = `Room: ${roomSwitcher.options[roomSwitcher.selectedIndex].text}`;
        }

        function loadMessages() {
            messageListener = onChildAdded(currentMessagesRef, (snapshot) => {
                const data = snapshot.val();
                displayMessage(data);
            });
        }

        function displayMessage(data) {
            const message = document.createElement('div');
            message.className = 'message';
            message.innerHTML = `
                <span class="username">${sanitizeMessage(data.username)}:</span> ${sanitizeMessage(data.message)}
                <div class="timestamp">${new Date(data.timestamp).toLocaleTimeString()}</div>
            `;
            messageArea.appendChild(message);
            messageArea.scrollTop = messageArea.scrollHeight;
        }

        function sendMessage() {
            const messageText = messageInput.value.trim();
            if (messageText !== '') {
                const messageData = {
                    username: username,
                    message: messageText,
                    timestamp: Date.now()
                };

                push(currentMessagesRef, messageData);
                messageInput.value = '';
            }
        }

        function downloadChatLog() {
            const messages = Array.from(messageArea.children).map(msg => {
                const username = msg.querySelector('.username').textContent;
                const messageText = msg.textContent.substring(username.length);
                const timestamp = msg.querySelector('.timestamp').textContent;
                return `${timestamp} - ${username}${messageText}`;
            }).join('\n');

            const blob = new Blob([messages], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `chat-log-${currentRoom}-${new Date().toLocaleDateString()}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        }

        function saveUsername(username) {
            localStorage.setItem('savedUsername', username);
        }

        function loadSavedUsername() {
            const savedUsername = localStorage.getItem('savedUsername');
            if (savedUsername) {
                usernameInput.value = savedUsername;
            }
        }

        function returnHome() {
            chatContainer.style.display = 'none';
            loginContainer.style.display = 'block';
            messageArea.innerHTML = '';
            if (messageListener) {
                messageListener();
            }
        }

        function clearChat() {
            const roomMessagesRef = ref(db, `rooms/${currentRoom}/messages`);
            set(roomMessagesRef, null).then(() => {
                messageArea.innerHTML = '';
                console.log('Chat cleared successfully');
            }).catch((error) => {
                console.error("Error clearing chat:", error);
                alert('Failed to clear chat. Please try again.');
            });
        }

        // Event Listeners
        roomSwitcher.addEventListener('change', function() {
            const newRoom = this.value;
            joinRoom(newRoom);
        });

        document.getElementById('sendButton').addEventListener('click', sendMessage);
        downloadLogButton.addEventListener('click', downloadChatLog);
        clearChatButton.addEventListener('click', clearChat);
        returnHomeButton.addEventListener('click', returnHome);

        messageInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Updated dropdown handlers
        moreButton.addEventListener('click', function(event) {
            event.stopPropagation();
            moreDropdown.classList.toggle('show');
        });

        window.addEventListener('click', function(event) {
            if (!event.target.closest('.more-dropdown')) {
                if (moreDropdown.classList.contains('show')) {
                    moreDropdown.classList.remove('show');
                }
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            loadSavedUsername();
        });

        usernameInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                joinChat();
            }
        });

        // Auto-cleanup old messages
        setInterval(() => {
            const oneHourAgo = Date.now() - (60 * 60 * 1000);
            ['chat1', 'chat2', 'chat3', 'chat4'].forEach(room => {
                const roomMessagesRef = ref(db, `rooms/${room}/messages`);
                get(roomMessagesRef).then((snapshot) => {
                    if (snapshot.exists()) {
                        snapshot.forEach((childSnapshot) => {
                            const message = childSnapshot.val();
                            if (message.timestamp < oneHourAgo) {
                                remove(childSnapshot.ref);
                            }
                        });
                    }
                });
            });
        }, 60000);
    </script>

</html>
