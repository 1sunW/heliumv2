<html lang="en"><head><style>body {transition: opacity ease-in 0.2s; } 
body[unresolved] {opacity: 0; display: block; overflow: hidden; position: relative; } 
</style>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ZGC AI Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<script>
const ACTIVE_THEME_KEY = 'zgc_theme_v2_active';
function hexToRGBA(hex, alpha = 1) {
  if (!hex) return `rgba(255,255,255,${alpha})`;
  let cleaned = hex.replace('#', '');
  if (cleaned.length === 3) cleaned = cleaned.split('').map(c => c+c).join('');
  const num = parseInt(cleaned,16);
  return `rgba(${(num>>16)&255}, ${(num>>8)&255}, ${num&255}, ${alpha})`;
}
function applyTheme(theme) {
  if (!theme) return;
  const root = document.documentElement.style;
  root.setProperty('--bg-color', theme.bg);
  root.setProperty('--nav-color', theme.nav || 'rgba(0,0,0,0.4)');
  root.setProperty('--text-color', theme.text || '#fff');
  root.setProperty('--accent-color', theme.accent);
  root.setProperty('--input-color', theme.cardBg || 'rgba(255,255,255,0.1)');
  root.setProperty('--shadow-color', hexToRGBA(theme.glow || theme.accent, 0.4));
}
(function(){
  let data = localStorage.getItem(ACTIVE_THEME_KEY);
  if (data) { try { applyTheme(JSON.parse(data)); } catch(e){console.log(e);} }
})();
</script>

<style>
:root {
  --bg-color:#0a0f1a;
  --nav-color:rgba(0,0,0,0.4);
  --text-color:#fff;
  --accent-color:#aad4ff;
  --input-color:rgba(255,255,255,0.1);
  --shadow-color:rgba(0,0,0,0.55);
}
body {
  margin:0; padding:0; font-family:'Inter',Arial,sans-serif;
  background-color: var(--bg-color); color: var(--text-color);
  height:100vh; display:flex; flex-direction:column; overflow:hidden;
}
#particles-js { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; }

.navbar {
  height:60px; padding:0 12px; display:flex; justify-content:space-between; align-items:center;
  background-color: var(--nav-color); backdrop-filter: blur(10px);
  border-bottom:1px solid rgba(255,255,255,0.1); z-index:100;
}
.navbar-brand { font-size:1.5em; font-weight:700; color: var(--accent-color); text-decoration:none; }
.nav-links { display:flex; gap:6px; }
.nav-links a { padding:8px 10px; border-radius:8px; color:var(--text-color); text-decoration:none; transition:0.2s;}
.nav-links a:hover { background:rgba(255,255,255,0.1); color: var(--accent-color); }

@media (max-width: 550px) {
  .nav-links a { font-size: 0; padding: 10px 12px; }
  .nav-links a i { font-size: 1em; }
}

.app {
  flex: 1; display: grid; grid-template-columns: 300px 1fr;
  max-width: 1200px; width: 95%; margin: 20px auto;
  background: rgba(255,255,255,0.02); border-radius: 12px;
  backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05);
  overflow: hidden;
}

.left { 
  padding:20px; border-right:1px solid rgba(255,255,255,0.05); 
  display:flex; flex-direction:column; gap:10px; 
}
.main { display:flex; flex-direction:column; height:100%; overflow:hidden; }

.messages { 
  flex: 1; overflow-y: auto; padding: 20px; 
  display: flex; flex-direction: column; gap: 15px;
  scrollbar-width: thin; scrollbar-color: var(--accent-color) transparent;
}
.messages::-webkit-scrollbar { width: 8px; }
.messages::-webkit-scrollbar-thumb { background-color: var(--accent-color); border-radius: 4px; }
.messages::-webkit-scrollbar-track { background: transparent; }

.msg { 
  max-width: 80%; padding: 12px; border-radius: 12px; 
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.05);
  word-wrap: break-word; overflow-wrap: break-word;
  animation: fadeIn 0.3s ease;
}
.msg.user { 
  align-self: flex-end; 
  background: var(--accent-color); 
  color: #000; 
  border-bottom-right-radius: 4px;
}
.msg.assistant { 
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}

.meta { 
  font-size: 11px; margin-bottom: 4px; 
  font-weight: 600; opacity: 0.8; 
}
.msg.user .meta { color: rgba(0,0,0,0.6); }

.input-row { 
  padding: 20px; border-top: 1px solid rgba(255,255,255,0.05); 
  display: flex; gap: 10px; 
}
input { 
  background: rgba(255,255,255,0.05); 
  border: 1px solid rgba(255,255,255,0.1); 
  color: #fff; padding: 10px; border-radius: 8px; 
  outline: none; transition: all 0.2s;
}
input:focus { 
  border-color: var(--accent-color); 
  box-shadow: 0 0 0 2px rgba(170, 212, 255, 0.2);
}
input::placeholder { color: rgba(255,255,255,0.4); }

button { 
  cursor: pointer; border: none; border-radius: 8px; 
  padding: 10px 15px; background: var(--accent-color); 
  font-weight: bold; transition: all 0.2s; color: #000;
}
button:hover { transform: translateY(-1px); box-shadow: 0 4px 12px var(--shadow-color); }
button:active { transform: translateY(0); }
button:disabled { opacity: 0.5; cursor: not-allowed; }
button.ghost { 
  background: transparent; color: #fff; 
  border: 1px solid rgba(255,255,255,0.1); 
}

.info-card {
  background: rgba(255,255,255,0.03); 
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 8px; padding: 12px; font-size: 13px;
  line-height: 1.5;
}
.info-card strong { color: var(--accent-color); }

.status-indicator {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; padding: 8px; border-radius: 6px;
  background: rgba(255,255,255,0.03);
}
.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #00ff88; animation: pulse 2s infinite;
}

@keyframes fadeIn { 
  from { opacity: 0; transform: translateY(10px); } 
  to { opacity: 1; transform: translateY(0); } 
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

@media(max-width:800px){ 
  .app { grid-template-columns:1fr; width:100%; margin:0; } 
  .left { display:none; } 
}
</style>
</head>
<body>
<div id="particles-js"></div>

<div class="app">
  <aside class="left">
    <h2>AI Assistant</h2>
    
    <div class="info-card">
      <strong>Model:</strong> GPT-3.5 Turbo<br>
      <strong>Status:</strong> <span id="aiStatus">Ready</span>
    </div>

    <div class="status-indicator">
      <div class="status-dot"></div>
      <span>AI Online</span>
    </div>

    <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05);">
      <button id="clearChat" class="ghost" style="width: 100%;">
        <i class="fas fa-trash"></i> Clear Conversation
      </button>
    </div>
  </aside>

  <main class="main">
    <div class="messages" id="messages"><div class="msg assistant">
      <div class="meta">Hydrogen • 08:15 PM</div>
      <div class="content">Hello! I'm Hydrogen. How can I assist you today?</div>
    </div></div>
    <div class="input-row">
      <input id="messageInput" style="flex:1" type="text" placeholder="Ask me anything...">
      <button id="sendBtn">
        <i class="fas fa-paper-plane"></i> Send
      </button>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
// Particles.js config
particlesJS("particles-js", {
  particles: {
    number: { value: 80, density: { enable: true, value_area: 800 }},
    color: { value: "#ffffff" },
    shape: { type: "circle" },
    opacity: { value: 0.3, random: true },
    size: { value: 3, random: true },
    line_linked: { enable: false },
    move: { enable: true, speed: 1.5, direction: "none", random: true, out_mode: "out" }
  },
  interactivity: { 
    detect_on: "canvas", 
    events: { onhover: { enable: false }, onclick: { enable: false } }
  },
  retina_detect: true
});

(function(){
  const $ = s => document.querySelector(s);
  const messagesEl = $('#messages');
  const msgInput = $('#messageInput');
  const sendBtn = $('#sendBtn');
  const statusEl = $('#aiStatus');
  
  // ChatAnywhere API key embedded here
  const API_KEY = "sk-0F093F5sSpnQghjmh1br9L0hZk6dTEDtMIZD06O4xiWwHv0Q";
  const API_URL = 'https://api.chatanywhere.tech/v1/chat/completions';
  
  let conversationHistory = [];

  function addMessage(text, isUser) {
    const div = document.createElement('div');
    div.className = 'msg' + (isUser ? ' user' : ' assistant');
    
    const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    const label = isUser ? 'You' : 'Hydrogen';
    
    const safeText = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    
    div.innerHTML = `
      <div class="meta">${label} • ${time}</div>
      <div class="content">${safeText}</div>
    `;
    
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function sendMessage() {
    const text = msgInput.value.trim();
    if(!text) return;
    
    addMessage(text, true);
    conversationHistory.push({ role: "user", content: text });
    msgInput.value = '';
    
    sendBtn.disabled = true;
    msgInput.disabled = true;
    statusEl.textContent = 'Thinking...';
    
    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json', 
          'Authorization': `Bearer ${API_KEY}` 
        },
        body: JSON.stringify({ 
          model: "gpt-3.5-turbo", 
          messages: conversationHistory 
        })
      });
      
      const data = await response.json();
      const aiText = data?.choices?.[0]?.message?.content || "An error occurred";
      
      conversationHistory.push({ role: "assistant", content: aiText });
      addMessage(aiText, false);
      statusEl.textContent = 'Ready';
      
    } catch (err) {
      console.error(err);
      addMessage("Sorry, an error occurred. Please try again.", false);
      statusEl.textContent = 'Error';
    } finally {
      sendBtn.disabled = false;
      msgInput.disabled = false;
      msgInput.focus();
    }
  }
  
  sendBtn.onclick = sendMessage;
  msgInput.onkeydown = e => { if(e.key === 'Enter' && !e.shiftKey) sendMessage(); };
  
  $('#clearChat').onclick = () => {
    messagesEl.innerHTML = '';
    conversationHistory = [];
    addMessage("Conversation cleared. How can I help you?", false);
  };
  
})();
</script>
</body>
</html>
